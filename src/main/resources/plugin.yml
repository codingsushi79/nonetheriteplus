name: NoNetheritePlus
version: 1.4.0
main: com.codingsushi.nonetheriteplus.NoNetheritePlus
api-version: '1.21'
description: Configurable netherite crafting restrictions with material refund system and template control
authors:
  - SushiMC, SquareDealSam
website: https://github.com/codingsushi79/nonetheriteplus
commands:
  nonetherite:
    description: Shows NoNetheritePlus plugin information
    usage: /nonetherite [reload|stats|debug|preset] # Various subcommands available
    permission: nonetherite.info
permissions:
  nonetherite.info:
    description: Allows access to the /nonetherite command
    default: true
  nonetherite.reload:
    description: Allows reloading the plugin configuration
    default: op
  nonetherite.stats:
    description: Allows viewing plugin statistics
    default: op
  nonetherite.debug:
    description: Allows toggling debug mode
    default: op
  nonetherite.preset:
    description: Allows managing configuration presets
    default: op
