name: NoNetheriteExpanded
version: 1.3.0
main: com.example.nonetheriteexpanded.NoNetheriteExpanded
api-version: '1.21'
description: Configurable netherite crafting restrictions with material refund system and template control
authors:
  - SushiMC
website: https://github.com/codingsushi79/nonetheriteplus
commands:
  nonetherite:
    description: Shows NoNetheriteExpanded plugin information
    usage: /nonetherite [reload] # Optional, reloads the config.
    permission: nonetherite.info
permissions:
  nonetherite.info:
    description: Allows access to the /nonetherite command
    default: true
  nonetherite.reload:
    description: Allows reloading the plugin configuration
    default: op
